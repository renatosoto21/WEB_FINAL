{% extends "juegos/base.html" %}
{% load static %}

{% block content %}
<div class="container" style="margin-top: 80px; margin-bottom: 80px;">
    <div class="row justify-content-center">
        
        <div class="col-md-5 p-4" style="background-color: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: white; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);">
            
            <h2 style="margin-bottom: 20px;">Resumen de Compra</h2>
            <p style="font-size: 18px; color: #ccc;">Subtotal: ${{ total }}</p>
            <p style="color: #28a745; font-weight: bold; font-size: 16px;">Retiro presencial</p>
            
            <div class="mt-4 mb-4">
                <input type="text" class="form-control mb-2" placeholder="Código de descuento">
                <button class="btn btn-primary btn-sm" style="padding: 5px 15px;">Aplicar</button>
            </div>
            
            <a href="{% url 'finalizar_compra' %}" class="btn btn-primary w-100" style="padding: 12px; font-size: 18px; font-weight: bold;">
                Finalizar Compra
            </a>
            
            <div class="text-start mt-3 mb-3">
                <img src="/static/img/Metodos de Pago.jpg" alt="Webpay" style="height: 40px; background-color: white; padding: 5px; border-radius: 5px;">
            </div>
            
            <hr style="border-color: #555; margin-top: 20px; margin-bottom: 20px;">
            
            <h3>Total a Pagar: ${{ total }}</h3>
            
        </div>

    </div>
</div>
{% endblock %}
