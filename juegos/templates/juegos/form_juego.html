<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ accion }} Videojuego</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="mb-3">
                    <a href="{% url 'panel_admin' %}" class="text-decoration-none">← Volver al Panel</a>
                </div>

                <div class="card shadow">
                    <div class="card-header bg-dark text-white py-3">
                        <h4 class="card-title mb-0">{{ accion }} Nuevo Videojuego</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            {% for field in form %}
                                <div class="mb-3">
                                    <label class="form-label fw-bold">{{ field.label }}</label>
                                    {{ field }}
                                    {% if field.help_text %}
                                        <div class="form-text text-muted">{{ field.help_text }}</div>
                                    {% endif %}
                                    {% if field.errors %}
                                        <div class="text-danger small">{{ field.errors }}</div>
                                    {% endif %}
                                </div>
                            {% endfor %}

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a href="{% url 'panel_admin' %}" class="btn btn-secondary me-md-2">Cancelar</a>
                                <button type="submit" class="btn btn-success px-4">Guardar Videojuego</button>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
