{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ accion }} Categoría - Gaming Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body {
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .form-container {
        background-color: #151515;
        border: 1px solid #2a2f36;
        border-radius: 12px;
        padding: 2rem;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1);
    }

    .form-container h2 {
        color: #00ffff;
        margin-bottom: 2rem;
        text-align: center;
    }

    .form-control {
        background-color: #1a1a1a !important;
        border: 1px solid #2a2f36 !important;
        color: #ffffff !important;
    }

    .form-control:focus {
        background-color: #1a1a1a !important;
        border-color: #00ffff !important;
        color: #ffffff !important;
        box-shadow: 0 0 0 0.2rem rgba(0, 255, 255, 0.25) !important;
    }

    .form-label {
        color: #b3b3b3;
        font-weight: 500;
    }

    .btn-primary {
        background-color: #3d2b56 !important;
        border-color: #3d2b56 !important;
    }

    .btn-primary:hover {
        background-color: #5a3d7a !important;
        border-color: #5a3d7a !important;
    }

    .btn-secondary {
        background-color: #555 !important;
        border-color: #555 !important;
    }

    .btn-secondary:hover {
        background-color: #666 !important;
        border-color: #666 !important;
    }
    </style>
</head>
<body>

<div class="form-container">
    <h2>{{ accion }} Categoría</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label for="id_nombre" class="form-label">Nombre:</label>
            {{ form.nombre }}
        </div>

        <div class="mb-3">
            <label for="id_slug" class="form-label">Slug:</label>
            {{ form.slug }}
            <small class="text-muted d-block mt-1">Se genera automáticamente desde el nombre</small>
        </div>

        <div class="mb-3">
            <label for="id_descripcion" class="form-label">Descripción:</label>
            {{ form.descripcion }}
        </div>

        <div class="d-flex gap-2 justify-content-center mt-4">
            <button type="submit" class="btn btn-primary">{{ accion }}</button>
            <a href="{% url 'admin_categorias' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
