<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Agregar Juego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: sans-serif; }
        .card-custom { background-color: #151515; border: 1px solid #2a2f36; border-radius: 12px; }
        .form-control, .form-select { background-color: #1a1a1a; border: 1px solid #333; color: #fff; }
        .form-control:focus, .form-select:focus { background-color: #222; border-color: #00ffff; color: #fff; box-shadow: 0 0 8px rgba(0, 255, 255, 0.2); }
        .btn-purple { background-color: #3d2b56; color: #fff; border: none; }
        .btn-purple:hover { background-color: #513973; color: #fff; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card card-custom p-4">
                <h2 class="text-center mb-4" style="color: #00ffff;">Agregar Nuevo Videojuego</h2>
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label text-white-50 small">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="/admin-panel/" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-purple px-4">Guardar Videojuego</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Este pequeño truco le mete las clases de Bootstrap a los inputs automáticos de Django
    document.querySelectorAll('input, select, textarea').forEach(function(el) {
        if(el.type !== 'checkbox') {
            el.classList.add('form-control');
        } else {
            el.classList.add('form-check-input');
        }
    });
</script>
</body>
</html>
