<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Videojuego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container my-5 text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h3 class="text-danger mb-4">¿Estás seguro?</h3>
                    <p>Vas a eliminar definitivamente el juego: <strong>{{ juego.titulo }}</strong>. Esta acción no se puede deshacer.</p>
                    
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <a href="{% url 'panel_admin' %}" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Sí, Eliminar de todas formas</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
