<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gaming Store - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #151515;
            border: 1px solid #2a2f36;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .brand-title {
            color: #00ffff;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
        }
        .form-control {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
        }
        .form-control:focus {
            background-color: #222;
            border-color: #00ffff;
            color: #fff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }
        .btn-gaming {
            background-color: #3d2b56;
            color: #fff;
            font-weight: 600;
            border: none;
            transition: background 0.2s;
        }
        .btn-gaming:hover {
            background-color: #513973;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="brand-title mb-4">Gaming Store</h2>
        <h5 class="text-center text-white-50 mb-4">Control de Acceso</h5>
        
        {% if error_msg %}
            <div class="alert alert-danger bg-danger text-white border-0 py-2 small mb-3 text-center" style="border-radius: 6px;">
                {{ error_msg }}
            </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-white-50 small">Nombre de Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ej: admin" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-white-50 small">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-gaming w-100 py-2">Ingresar al Sistema</button>
        </form>
    </div>

</body>
</html>
