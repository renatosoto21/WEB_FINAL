<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gaming Store - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <form method="POST" action="" novalidate></form>
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { background-color: #151515; border: 1px solid #2a2f36; border-radius: 12px; width: 100%; max-width: 450px; padding: 2rem; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .brand-title { color: #00ffff; font-weight: 800; text-align: center; }
        .form-control { background-color: #1a1a1a; border: 1px solid #333; color: #fff; }
        .form-control:focus { background-color: #222; border-color: #00ffff; color: #fff; box-shadow: 0 0 8px rgba(0, 255, 255, 0.2); }
        .btn-gaming { background-color: #3d2b56; color: #fff; font-weight: 600; border: none; }
        .btn-gaming:hover { background-color: #513973; color: #fff; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2 class="brand-title mb-2">Gaming Store</h2>
        <h6 class="text-center text-white-50 mb-4">Crea tu cuenta de jugador</h6>
        
        
        <form method="POST" action="">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-2">
                    <label class="form-label text-white-50 small mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: #ff4444; font-size: 13px; margin-top: 5px;">
                            {{ field.errors.0 }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}


            <button type="submit" class="btn btn-gaming w-100 py-2 mt-3">Crear Cuenta</button>
            <p class="text-center text-white-50 mt-3 small mb-0">¿Ya tienes cuenta? <a href="/iniciar-sesion/" style="color: #00ffff; text-decoration: none;">Inicia sesión</a></p>
        </form>
    </div>
    <script>
        document.querySelectorAll('input').forEach(el => el.classList.add('form-control'));
    </script>
</body>
</html>
